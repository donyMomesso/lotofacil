name: Laboratório Lotofácil - ciclo diário

on:
  workflow_dispatch:
  schedule:
    # 13:00 UTC = 10:00 no horário de Brasília (sem horário de verão desde 2019)
    - cron: "0 13 * * *"

permissions:
  contents: write

jobs:
  ciclo-diario:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar ciclo diário (busca resultado, confere, gera jogos, relatório e painel)
        working-directory: scripts
        run: python ciclo_diario.py

      - name: Salvar tudo no repositório
        run: |
          git config user.name "lotofacil-lab-bot"
          git config user.email "bot@users.noreply.github.com"
          git add dados/ reports/ painel.html diario_estatistico.md
          git commit -m "Atualiza laboratório: novo ciclo diário" || echo "Sem alterações para commitar"
          git push
