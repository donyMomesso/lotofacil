name: Laboratório Lotofácil - ciclo diário

on:
  workflow_dispatch:
  schedule:
    # 01:00 UTC = 22:00 no horário de Brasília (após o sorteio das 20h)
    - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  ciclo-diario:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar ciclo diário completo
        working-directory: scripts
        run: python ciclo_diario.py

      - name: Salvar tudo no repositório
        run: |
          git config user.name "lotofacil-lab-bot"
          git config user.email "bot@users.noreply.github.com"
          git add dados/ reports/ scripts/ painel.html painel_avancado.html painel_jogos.html painel_jogos_v2.html painel_mobile.html index.html diario_estatistico.md
          git commit -m "Atualiza laboratório: novo ciclo diário" || echo "Sem alterações para commitar"
          git push
