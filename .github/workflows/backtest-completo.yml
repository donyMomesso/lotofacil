name: Laboratório Lotofácil - backtest completo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest-completo:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar backtest completo (M1-M8)
        working-directory: scripts
        run: python simular_backtest.py

      - name: Salvar resultados do backtest
        run: |
          git config user.name "lotofacil-lab-bot"
          git config user.email "bot@users.noreply.github.com"
          git add dados/simulacao_metodos.csv dados/estatisticas_simulacao.csv
          git commit -m "Atualiza backtest completo (M1-M8)" || echo "Sem alterações para commitar"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push rejeitado (tentativa $i/5), outro commit chegou ao main. Tentando de novo em 5s..."
            sleep 5
          done
