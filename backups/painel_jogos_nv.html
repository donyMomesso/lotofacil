document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

content:space-between; flex-wrap:wrap; gap:12px; box-shadow:0 4px 18px rgba(43,10,77,.25);\">\n    <div>\n      <a href=\"Lotofacil Hub.dc.html\" style=\"font-size:11.5px; color:rgba(255,255,255,.6); text-decoration:none;\">← Lotofácil Lab<\u002Fa>\n      <h1 style=\"font-family:'Sora',sans-serif; font-size:20px; font-weight:800; color:#fff; margin:4px 0 2px;\">Lotofácil Lab — Painel Avançado<\u002Fh1>\n      <div style=\"font-size:12px; color:rgba(255,255,255,.75);\">Laboratório Estatístico Educativo · Atualizado em 04/07/2026 11:50<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.3); border-radius:8px; padding:5px 12px; font-size:11.5px; font-weight:600; color:#fff;\">⚠ Apenas estudo estatístico — não é recomendação de aposta<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:flex; border-bottom:2px solid #E9DFFB; padding:0 28px; background:#fff; overflow-x:auto; box-shadow:0 2px 8px rgba(43,10,77,.06);\">\n    <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"6\">\n      <div onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- ===================== JOGOS & MOLDURA ===================== -->\n  <sc-if value=\"{{ isJogos }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"padding:24px 28px; max-width:1280px; margin:0 auto;\">\n      <div style=\"background:#FFF7EA; border:1px solid #FDE9C4; border-radius:8px; padding:12px 16px; font-size:12px; color:#92400E; margin-bottom:20px; line-height:1.6;\">\n        <b style=\"color:#7C2D12;\">Lembrete educativo:<\u002Fb> os jogos são gerados por 5 métodos estatísticos para fins de estudo comparativo. Nenhum método tem vantagem preditiva — todos convergem para a média teórica de <b>9 acertos<\u002Fb> no longo prazo. Dezenas em <b style=\"color:#B45309;\">âmbar<\u002Fb> = top 5 mais frequentes · em <b style=\"color:#BE185D;\">rosa<\u002Fb> = top 5 maior atraso.\n      <\u002Fdiv>\n\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap;\">\n        <span style=\"font-size:21px; font-weight:800; color:#5B21B6; font-family:'Sora',sans-serif;\">Concurso #3727<\u002Fspan>\n        <span style=\"font-size:13px; color:#8B76B0;\">Gerado em 04/07/2026<\u002Fspan>\n        <span style=\"background:#F3E8FF; color:#7C3AED; border-radius:6px; padding:3px 10px; font-size:11.5px; font-weight:600;\">Próximo sorteio<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; gap:18px; flex-wrap:wrap; margin-bottom:16px; align-items:center; font-size:12px; color:#8B76B0;\">\n        <div style=\"display:flex; align-items:center; gap:6px;\"><span style=\"width:20px;height:20px;border-radius:50%;background:#FFFBEB;border:2px solid #F59E0B;display:inline-block;\"><\u002Fspan> Mais frequente (top 5)<\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:6px;\"><span style=\"width:20px;height:20px;border-radius:50%;background:#FDF2F8;border:2px solid #EC4899;display:inline-block;\"><\u002Fspan> Maior atraso (top 5)<\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:6px;\"><span style=\"width:20px;height:20px;border-radius:50%;background:#FAF7FF;border:2px solid #E9DFFB;display:inline-block;\"><\u002Fspan> Normal<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;\">\n        <div style=\"background:#fff; border:1px solid #E9DFFB; border-radius:14px; padding:18px; box-shadow:0 2px 10px rgba(43,10,77,.06);\">\n          <div style=\"font-size:11px; font-weight:700; color:#5B21B6; text-transform:uppercase; letter-spacing:.06em; margin-bottom:14px;\">🔲 Moldura (dezenas da borda 01–25)<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:8px; max-width:280px; margin:0 auto;\">\n            <sc-for list=\"{{ molduraCells }}\" as=\"c\" hint-placeholder-count=\"25\">\n              <div style=\"{{ c.style }}\">{{ c.num }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top:12px; font-size:11px; color:#8B76B0;\">As 16 dezenas da borda do volante. Estratégia: escolha 2 para excluir do seu jogo.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E9DFFB; border-radius:14px; padding:18px; box-shadow:0 2px 10px rgba(43,10,77,.06);\">\n          <div style=\"font-size:11px; font-weight:700; color:#5B21B6; text-transform:uppercase; letter-spacing:.06em; margin-bottom:14px;\">🔵 Miolo (dezenas internas)<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:8px; max-width:280px; margin:0 auto;\">\n            <sc-for list=\"{{ mioloCells }}\" as=\"c\" hint-placeholder-count=\"25\">\n              <div style=\"{{ c.style }}\">{{ c.num }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top:12px; font-size:11px; color:#8B76B0;\">As 9 dezenas do centro do volante. Estratégia: inclua pelo menos 6 no seu jogo.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#FFF7EA; border:1px solid #FDE9C4; border-radius:8px; padding:12px 16px; font-size:12px; color:#92400E; margin-bottom:20px; line-height:1.6;\">\n        <b style=\"color:#7C2D12;\">Diretrizes observadas no histórico:<\u002Fb> pares/ímpares equilibrados (entre 6 e 9 pares em 15 dezenas), soma total entre <b>180 e 220<\u002Fb>, e distribuição uniforme entre as 5 linhas e 5 colunas do volante — evitando concentrar dezenas em um único lado da cartela.\n      <\u002Fdiv>\n\n      <div style=\"background:#fff; border:1px solid #E9DFFB; border-radius:14px; padding:18px; box-shadow:0 2px 10px rgba(43,10,77,.06); overflow:auto;\">\n        <div style=\"font-size:11px; font-weight:700; color:#5B21B6; text-transform:uppercase; letter-spacing:.06em; margin-bottom:14px;\">📋 Desdobramento — 5 Métodos × 15 Dezenas<\u002Fdiv>\n        <sc-for list=\"{{ posCols }}\" as=\"pc\" hint-placeholder-count=\"15\"><\u002Fsc-for><sc-for list=\"{{ desdobramento }}\" as=\"m\" hint-placeholder-count=\"5\">\n              <\u002Fsc-for><sc-for list=\"{{ m.cells }}\" as=\"c\" hint-placeholder-count=\"15\"><\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:12.5px;\">\n          <thead>\n            <tr style=\"color:#8B76B0; font-size:11px; text-transform:uppercase;\">\n              <th style=\"padding:8px 8px; border-bottom:1px solid #E9DFFB; text-align:left;\">Método<\u002Fth>\n              <th style=\"padding:6px 6px; border-bottom:1px solid #E9DFFB; text-align:center;\">{{ pc }}<\u002Fth>\n              <th style=\"padding:8px 8px; border-bottom:1px solid #E9DFFB; text-align:center;\">Soma<\u002Fth>\n              <th style=\"padding:8px 8px; border-bottom:1px solid #E9DFFB; text-align:center;\">P<\u002Fth>\n              <th style=\"padding:8px 8px; border-bottom:1px solid #E9DFFB; text-align:center;\">Í<\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr>\n                <td style=\"padding:8px 8px; border-bottom:1px solid #F1ECFB;\"><span style=\"{{ m.badgeStyle }}\">{{ m.label }}<\u002Fspan><\u002Ftd>\n                <td style=\"{{ c.style }}\">{{ c.num }}<\u002Ftd>\n                <td style=\"padding:8px 8px; border-bottom:1px solid #F1ECFB; text-align:center; font-weight:700;\">{{ m.soma }}<\u002Ftd>\n                <td style=\"padding:8px 8px; border-bottom:1px solid #F1ECFB; text-align:center;\">{{ m.p }}<\u002Ftd>\n                <td style=\"padding:8px 8px; border-bottom:1px solid #F1ECFB; text-align:center;\">{{ m.i }}<\u002Ftd>\n              <\u002Ftr>\n            \n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== MEUS JOGOS ===================== -->\n  <sc-if value=\"{{ isMeusJogos }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:24px 28px; max-width:1280px; margin:0 auto;\">\n      <div style=\"background:#FFF7EA; border:1px solid #FDE9C4; border-radius:8px; padding:12px 16px; font-size:12px; color:#92400E; margin-bottom:20px; line-height:1.6;\">\n        <b style=\"color:#7C2D12;\">Meus Jogos Próprios:<\u002Fb> registre aqui seus jogos manuais para o próximo concurso. Clique nas dezenas do volante, informe o concurso alvo e salve. Os dados ficam salvos no seu navegador.\n      <\u002Fdiv>\n\n      <div style=\"background:#fff; border:1px solid #E9DFFB; border-radius:14px; padding:18px; box-shadow:0 2px 10px rgba(43,10,77,.06); overflow:auto; margin-bottom:20px;\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:6px;\">\n          <div style=\"font-size:11px; font-weight:700; color:#5B21B6; text-transform:uppercase; letter-spacing:.06em;\">🔗 Fechamento combinatório (16 a 20 dezenas)<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12px; color:#6B5B8A; line-height:1.6; margin-bottom:14px;\">\n          Em vez de escolher 15 dezenas, você escolhe um grupo maior. O sistema calcula quantos jogos de 15 dezenas são necessários para cobrir <b>todas as combinações possíveis<\u002Fb> dentro do grupo — garantindo que, se as 15 dezenas sorteadas estiverem todas no seu grupo, pelo menos um jogo acerta todas.\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:14px;\">\n          <span style=\"font-size:11px; color:#8B76B0;\">Tamanho do grupo:<\u002Fspan>\n          <sc-for list=\"{{ fechamentoOptions }}\" as=\"fo\" hint-placeholder-count=\"5\">\n            <div onclick=\"{{ fo.onClick }}\" style=\"{{ fo.style }}\">{{ fo.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n          <button onclick=\"{{ autoFechamento }}\" style=\"background:linear-gradient(135deg,#7C3AED,#EC4899); border:none; color:#fff; border-radius:8px; padding:7px 14px; cursor:pointer; font-size:12px; font-weight:700; margin-left:auto;\">✨ Preencher automaticamente<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1fr auto; gap:20px; align-items:start;\">\n          <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:6px; max-width:250px;\">\n            <sc-for list=\"{{ fechamentoGrid }}\" as=\"c\" hint-placeholder-count=\"25\">\n              <div onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.num }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:10px; min-width:180px;\">\n            <div style=\"background:#F8F2FF; border:1px solid #E9DFFB; border-radius:8px; padding:10px 14px;\">\n              <div style=\"font-size:10px; color:#8B76B0; text-transform:uppercase;\">Selecionadas<\u002Fdiv>\n              <div style=\"font-size:19px; font-weight:700; margin-top:2px;\">{{ fSelCount }}/{{ fSelTotal }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#F8F2FF; border:1px solid #E9DFFB; border-radius:8px; padding:10px 14px;\">\n              <div style=\"font-size:10px; color:#8B76B0; text-transform:uppercase;\">Jogos de 15 necessários<\u002Fdiv>\n              <div style=\"font-size:19px; font-weight:700; margin-top:2px; color:#7C3AED;\">{{ totalCombos }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#F8F2FF; border:1px solid #E9DFFB; border-radius:8px; padding:10px 14px;\">\n              <div style=\"font-size:10px; color:#8B76B0; text-transform:uppercase;\">Custo aproximado (bilhete único)<\u002Fdiv>\n              <div style=\"font-size:19px; font-weight:700; margin-top:2px; color:#D97706;\">{{ custoAproximado }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasFechamentoJogos }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:16px; border-top:1px solid #F1ECFB; padding-top:14px;\">\n            <div style=\"font-size:11px; font-weight:700; color:#5B21B6; text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px;\">16 jogos gerados (cobertura completa — pode ser dividido entre apostadores)<\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:6px; max-height:220px; overflow:auto;\">\n              <sc-for list=\"{{ fechamentoJogos }}\" as=\"fj\" hint-placeholder-count=\"16\">\n                <div style=\"background:#F8F2FF; border:1px solid #E9DFFB; border-radius:6px; padding:6px 10px; font-family:monospace; font-size:11px;\">{{ fj.dezenasStr }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ showGerarOpcoes }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:16px; border-top:1px solid #F1ECFB; padding-top:14px;\">\n            <div style=\"font-size:11.5px; color:#6B5B8A; line-height:1.6; margin-bottom:10px;\">\n              Acima de 16 dezenas o número de jogos para cobertura completa cresce muito rápido (136 a 15.504) — inviável de gerenciar manualmente. Em vez disso, geramos <b>5 opções de jogos de 15 dezenas<\u002Fb> a partir do seu grupo de {{ fSelTotal }}, variando a combinação e mantendo soma, pares/ímpares e distribuição no volante dentro dos padrões observados no histórico.\n            <\u002Fdiv>\n            <button onclick=\"{{ gerarOpcoesFechamento }}\" style=\"background:linear-gradient(135deg,#7C3AED,#EC4899); border:none; color:#fff; border-radius:8px; padding:9px 16px; cursor:pointer; font-size:12.5px; font-weight:700; margin-bottom:14px;\">🎲 Gerar 5 opções de jogos<\u002Fbutton>\n\n            <sc-if value=\"{{ hasFechamentoOpcoes }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:12px;\">\n                <sc-for list=\"{{ fechamentoOpcoesView }}\" as=\"op\" hint-placeholder-count=\"5\">\n                  <div style=\"background:#F8F2FF; border:1px solid #E9DFFB; border-radius:10px; padding:12px;\">\n                    <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;\">\n                      <span style=\"font-size:11px; font-weight:700; color:#5B21B6;\">{{ op.titulo }}<\u002Fspan>\n                      <span style=\"{{ op.classificacaoStyle }}\">{{ op.classificacao }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-family:monospace; font-size:11.5px; color:#1F1235; line-height:1.5; margin-bottom:8px;\">{{ op.dezenasStr }}<\u002Fdiv>\n                    <div style=\"font-size:11px; color:#6B5B8A; line-height:1.7;\">\n                      Soma: <b>{{ op.soma }}<\u002Fb> · Pares/Ímpares: <b>{{ op.parImpar }}<\u002Fb><br>\n                      Moldura/Miolo: <b>{{ op.molduraMiolo }}<\u002Fb> · Seq. máx: <b>{{ op.seqMax }}<\u002Fb><br>\n                      Por linha (1-25): <b>{{ op.linhasStr }}<\u002Fb>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:1.1fr 0.85fr 1fr; gap:18px; margin-bottom:20px;\">\n        <div style=\"background:#fff; border:1px solid #E9DFFB; border-radius:14px; padding:20px; box-shadow:0 2px 10px rgba(43,10,77,.06);\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:12px;\">\n            <div style=\"font-size:11px; font-weight:700; color:#5B21B6; text-transform:uppercase; letter-spacing:.06em;\">🎰 Volante — clique para selecionar as dezenas<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:14px;\">\n            <span style=\"font-size:11px; color:#8B76B0;\">Perfil da sugestão:<\u002Fspan>\n            <sc-for list=\"{{ perfilOptions }}\" as=\"p\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ p.onClick }}\" style=\"{{ p.style }}\">{{ p.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n            <button onclick=\"{{ sugerirJogo }}\" style=\"background:linear-gradient(135deg,#7C3AED,#EC4899); border:none; color:#fff; border-radius:8px; padding:8px 14px; cursor:pointer; font-size:12.5px; font-weight:700; box-shadow:0 3px 10px rgba(124,58,237,.35); white-space:nowrap; margin-left:auto;\">✨ Sugerir combinação<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"font-size:10.5px; color:#8B76B0; margin-bottom:10px;\">🔓/🔒 clique no cadeado de uma dezena selecionada para travá-la nas próximas sugestões.<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:8px; max-width:300px; margin:0 auto 16px;\">\n            <sc-for list=\"{{ volante }}\" as=\"b\" hint-placeholder-count=\"25\">\n              <div style=\"position:relative;\">\n                <div onclick=\"{{ b.onClick }}\" style=\"{{ b.style }}\">{{ b.num }}<\u002Fdiv>\n                <sc-if value=\"{{ b.showLock }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div onclick=\"{{ b.onLockClick }}\" style=\"position:absolute; top:-6px; right:-6px; font-size:11px; cursor:pointer; background:#fff; border-radius:50%; width:16px; height:16px; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(0,0,0,.25);\">{{ b.lockIcon }}<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:10px; flex-wrap:wrap;\">\n            <div style=\"flex:1; background:#F8F2FF; border:1px solid #E9DFFB; border-radius:8px; padding:10px 14px; min-width:90px;\">\n              <div style=\"font-size:10px; color:#8B76B0; text-transform:uppercase;\">Dezenas<\u002Fdiv>\n              <div style=\"font-size:19px; font-weight:700; margin-top:2px;\">{{ selCount }}/15<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1; background:#F8F2FF; border:1px solid #E9DFFB; border-radius:8px; padding:10px 14px; min-width:90px;\">\n              <div style=\"font-size:10px; color:#8B76B0; text-transform:uppercase;\">Soma<\u002Fdiv>\n              <div style=\"font-size:19px; font-weight:700; margin-top:2px; color:#7C3AED;\">{{ selSoma }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1; background:#F8F2FF; border:1px solid #E9DFFB; border-radius:8px; padding:10px 14px; min-width:90px;\">\n              <div style=\"font-size:10px; color:#8B76B0; text-transform:uppercase;\">Pares/Ímpares<\u002Fdiv>\n              <div style=\"font-size:19px; font-weight:700; margin-top:2px; color:#D97706;\">{{ selParImpar }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff; border:1px solid #E9DFFB; border-radius:14px; padding:20px; box-shadow:0 2px 10px rgba(43,10,77,.06);\">\n          <div style=\"font-size:11px; font-weight:700; color:#5B21B6; text-transform:uppercase; letter-spacing:.06em; margin-bottom:14px;\">💾 Salvar jogo<\u002Fdiv>\n          <label style=\"font-size:12px; color:#8B76B0; display:block; margin-bottom:6px;\">Concurso alvo<\u002Flabel>\n          <input type=\"number\" value=\"{{ concursoAlvo }}\" onchange=\"{{ onConcursoChange }}\" min=\"1\" style=\"width:100%; background:#FAF7FF; border:1px solid #E9DFFB; border-radius:8px; padding:10px 14px; color:#1F1235; font-size:16px; font-weight:700; margin-bottom:14px;\">\n          <div style=\"display:flex; gap:10px; flex-wrap:wrap;\">\n            <button onclick=\"{{ addGame }}\" disabled=\"{{ addDisabled }}\" style=\"{{ addBtnStyle }}\">✅ Adicionar jogo<\u002Fbutton>\n            <button onclick=\"{{ clearSelected }}\" style=\"flex:0; background:#FDF2F8; border:1px solid #FBCFE8; color:#BE185D; border-radius:8px; padding:11px 16px; cursor:pointer; font-size:14px; font-weight:600;\">🗑 Limpar<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff; border:1px solid #E9DFFB; border-radius:14px; padding:20px; box-shadow:0 2px 10px rgba(43,10,77,.06);\">\n          <div style=\"font-size:11px; font-weight:700; color:#5B21B6; text-transform:uppercase; letter-spacing:.06em; margin-bottom:14px;\">🔥 Mapa de calor — orientação<\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-bottom:16px;\">\n            <sc-for list=\"{{ heatmap }}\" as=\"h\" hint-placeholder-count=\"25\">\n              <div style=\"{{ h.style }}\">\n                <div style=\"font-size:12px; font-weight:700;\">{{ h.num }}<\u002Fdiv>\n                <div style=\"font-size:8.5px; opacity:.75;\">{{ h.freq }}%<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-bottom:10px;\">\n            <div style=\"font-size:10px; font-weight:700; color:#B45309; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px;\">Top 5 mais frequentes<\u002Fdiv>\n            <div style=\"display:flex; gap:6px; flex-wrap:wrap;\">\n              <sc-for list=\"{{ topFreq }}\" as=\"n\" hint-placeholder-count=\"5\">\n                <div style=\"width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#FFFBEB;border:2px solid #F59E0B;color:#92400E;\">{{ n }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:10px; font-weight:700; color:#9D174D; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px;\">Top 5 maior atraso<\u002Fdiv>\n            <div style=\"display:flex; gap:6px; flex-wrap:wrap;\">\n              <sc-for list=\"{{ topAtraso }}\" as=\"n\" hint-placeholder-count=\"5\">\n                <div style=\"width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#FDF2F8;border:2px solid #EC4899;color:#9D174D;\">{{ n }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasSuggestions }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-bottom:20px;\">\n          <div style=\"font-size:11px; font-weight:700; color:#5B21B6; text-transform:uppercase; letter-spacing:.06em; margin-bottom:12px;\">✨ 3 sugestões baseadas no estudo<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:14px;\">\n            <sc-for list=\"{{ suggestionsView }}\" as=\"sg\" hint-placeholder-count=\"3\">\n              <div style=\"background:#fff; border:1px solid #E9DFFB; border-radius:14px; padding:16px; box-shadow:0 2px 10px rgba(43,10,77,.06);\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px;\">\n                  <span style=\"{{ sg.classificacaoStyle }}\">{{ sg.classificacao }}<\u002Fspan>\n                  <span style=\"font-size:11px; color:#8B76B0;\">Soma {{ sg.soma }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-family:monospace; font-size:12.5px; color:#1F1235; line-height:1.6; margin-bottom:10px;\">{{ sg.dezenasStr }}<\u002Fdiv>\n                <sc-for list=\"{{ sg.motivos }}\" as=\"m\" hint-placeholder-count=\"4\">\n                  <div style=\"font-size:11px; color:#6B5B8A; line-height:1.5; margin-bottom:3px;\">• {{ m }}<\u002Fdiv>\n                <\u002Fsc-for>\n                <button onclick=\"{{ sg.onUse }}\" style=\"width:100%; margin-top:10px; background:#F3E8FF; border:1px solid #7C3AED; color:#5B21B6; border-radius:8px; padding:8px; cursor:pointer; font-size:12.5px; font-weight:700;\">Usar esta combinação<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"background:#fff; border:1px solid #E9DFFB; border-radius:14px; padding:20px; box-shadow:0 2px 10px rgba(43,10,77,.06); margin-bottom:20px;\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:14px;\">\n          <div style=\"font-size:11px; font-weight:700; color:#5B21B6; text-transform:uppercase; letter-spacing:.06em;\">📈 Análise do jogo {{ analysisPartialLabel }}<\u002Fdiv>\n          <span style=\"{{ liveAnalysis.classificacaoStyle }}\">{{ liveAnalysis.classificacao }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px;\">\n          <div style=\"background:#F8F2FF; border:1px solid #E9DFFB; border-radius:8px; padding:10px 14px;\">\n            <div style=\"font-size:10px; color:#8B76B0; text-transform:uppercase;\">Moldura / Miolo<\u002Fdiv>\n            <div style=\"font-size:17px; font-weight:700; margin-top:2px;\">{{ liveAnalysis.moldura }}/16 · {{ liveAnalysis.miolo }}/9<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#F8F2FF; border:1px solid #E9DFFB; border-radius:8px; padding:10px 14px;\">\n            <div style=\"font-size:10px; color:#8B76B0; text-transform:uppercase;\">Quentes / Atrasadas<\u002Fdiv>\n            <div style=\"font-size:17px; font-weight:700; margin-top:2px; color:#B45309;\">{{ liveAnalysis.quentes }}/5 · <span style=\"color:#BE185D;\">{{ liveAnalysis.atrasadas }}/5<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#F8F2FF; border:1px solid #E9DFFB; border-radius:8px; padding:10px 14px;\">\n            <div style=\"font-size:10px; color:#8B76B0; text-transform:uppercase;\">Sequência máxima<\u002Fdiv>\n            <div style=\"font-size:17px; font-weight:700; margin-top:2px;\">{{ liveAnalysis.maxSeq }} seguidas<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#F8F2FF; border:1px solid #E9DFFB; border-radius:8px; padding:10px 14px;\">\n            <div style=\"font-size:10px; color:#8B76B0; text-transform:uppercase;\">Repetição vs. concurso 3726<\u002Fdiv>\n            <div style=\"font-size:17px; font-weight:700; margin-top:2px;\">{{ liveAnalysis.repetidos }}/15<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#F8F2FF; border:1px solid #E9DFFB; border-radius:8px; padding:10px 14px;\">\n            <div style=\"font-size:10px; color:#8B76B0; text-transform:uppercase;\">Soma na faixa comum (180–220)<\u002Fdiv>\n            <div style=\"font-size:17px; font-weight:700; margin-top:2px; color:{{ liveAnalysis.somaCorClass }};\">{{ liveAnalysis.somaLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#F8F2FF; border:1px solid #E9DFFB; border-radius:8px; padding:10px 14px;\">\n            <div style=\"font-size:10px; color:#8B76B0; text-transform:uppercase;\">Por linha do volante (1-5/6-10/11-15/16-20/21-25)<\u002Fdiv>\n            <div style=\"font-size:15px; font-weight:700; margin-top:2px;\">{{ liveAnalysis.linhasStr }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#F8F2FF; border:1px solid #E9DFFB; border-radius:8px; padding:10px 14px;\">\n            <div style=\"font-size:10px; color:#8B76B0; text-transform:uppercase;\">Por coluna do volante<\u002Fdiv>\n            <div style=\"font-size:15px; font-weight:700; margin-top:2px;\">{{ liveAnalysis.colunasStr }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:14px; font-size:11.5px; color:#8B76B0; line-height:1.6;\">\n          Estas métricas descrevem o perfil do jogo (distribuição, sequência, soma) — não indicam maior chance de acerto. Todo jogo de 15 dezenas tem a mesma probabilidade matemática de ser sorteado. O botão \"Sugerir combinação\" apenas monta um jogo que segue os padrões observados no histórico (moldura/miolo, equilíbrio quente/frio, soma comum) — é um exercício estatístico, não uma previsão.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff; border:1px solid #E9DFFB; border-radius:14px; padding:18px; box-shadow:0 2px 10px rgba(43,10,77,.06); overflow:auto;\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;\">\n          <div style=\"font-size:11px; font-weight:700; color:#5B21B6; text-transform:uppercase; letter-spacing:.06em;\">📋 Jogos registrados<\u002Fdiv>\n          <span style=\"font-size:12px; color:#8B76B0;\">{{ savedCount }}<\u002Fspan>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasNoGames }}\" hint-placeholder-val=\"{{ false }}\">\n              <\u002Fsc-if><sc-for list=\"{{ savedGamesView }}\" as=\"g\" hint-placeholder-count=\"0\">\n              <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:13px;\">\n          <thead><tr style=\"color:#8B76B0; font-size:11px; text-transform:uppercase;\"><th style=\"text-align:left; padding:8px 10px; border-bottom:1px solid #E9DFFB;\">Concurso<\u002Fth><th style=\"text-align:left; padding:8px 10px; border-bottom:1px solid #E9DFFB;\">Dezenas<\u002Fth><th style=\"text-align:left; padding:8px 10px; border-bottom:1px solid #E9DFFB;\">Soma<\u002Fth><th style=\"text-align:left; padding:8px 10px; border-bottom:1px solid #E9DFFB;\">P/Í<\u002Fth><th style=\"text-align:left; padding:8px 10px; border-bottom:1px solid #E9DFFB;\">Perfil<\u002Fth><th style=\"text-align:left; padding:8px 10px; border-bottom:1px solid #E9DFFB;\">Quente/Frio<\u002Fth><th style=\"padding:8px 10px; border-bottom:1px solid #E9DFFB;\"><\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td colspan=\"7\" style=\"text-align:center; color:#8B76B0; padding:20px;\">Nenhum jogo registrado ainda.<\u002Ftd><\u002Ftr>\n            \n            <tr>\n                <td style=\"padding:8px 10px; border-bottom:1px solid #F1ECFB;\">{{ g.concurso }}<\u002Ftd>\n                <td style=\"padding:8px 10px; border-bottom:1px solid #F1ECFB; font-family:monospace;\">{{ g.dezenasStr }}<\u002Ftd>\n                <td style=\"padding:8px 10px; border-bottom:1px solid #F1ECFB;\">{{ g.soma }}<\u002Ftd>\n                <td style=\"padding:8px 10px; border-bottom:1px solid #F1ECFB;\">{{ g.parImpar }}<\u002Ftd>\n                <td style=\"padding:8px 10px; border-bottom:1px solid #F1ECFB; font-size:11.5px; color:#6B5B8A;\">{{ g.analiseResumo }}<\u002Ftd>\n                <td style=\"padding:8px 10px; border-bottom:1px solid #F1ECFB;\"><span style=\"{{ g.classificacaoStyle }}\">{{ g.classificacao }}<\u002Fspan><\u002Ftd>\n                <td style=\"padding:8px 10px; border-bottom:1px solid #F1ECFB; text-align:right;\"><span onclick=\"{{ g.onRemove }}\" style=\"cursor:pointer; color:#BE185D; font-size:12px; font-weight:600;\">remover<\u002Fspan><\u002Ftd>\n              <\u002Ftr>\n            \n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== CONFERIDOR ===================== -->\n  <sc-if value=\"{{ isConferidor }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:24px 28px; max-width:1280px; margin:0 auto;\">\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap;\">\n        <span style=\"font-size:21px; font-weight:800; color:#5B21B6; font-family:'Sora',sans-serif;\">Concurso #3726<\u002Fspan>\n        <span style=\"font-size:13px; color:#8B76B0;\">Sorteado em 03/07/2026<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff; border:1px solid #E9DFFB; border-radius:14px; padding:18px; box-shadow:0 2px 10px rgba(43,10,77,.06); margin-bottom:16px;\">\n        <div style=\"font-size:11px; font-weight:700; color:#5B21B6; text-transform:uppercase; letter-spacing:.06em; margin-bottom:14px;\">🎰 Dezenas sorteadas no concurso #3726<\u002Fdiv>\n        <div style=\"display:flex; gap:8px; flex-wrap:wrap;\">\n          <sc-for list=\"{{ sorteadasView }}\" as=\"s\" hint-placeholder-count=\"15\">\n            <div style=\"width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:#DBEAFE;border:2px solid #2563EB;color:#1E40AF;\">{{ s }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff; border:1px solid #E9DFFB; border-radius:14px; padding:18px; box-shadow:0 2px 10px rgba(43,10,77,.06); overflow:auto;\">\n        <div style=\"font-size:11px; font-weight:700; color:#5B21B6; text-transform:uppercase; letter-spacing:.06em; margin-bottom:14px;\">🔍 Conferidor — acertos por método<\u002Fdiv>\n        <sc-for list=\"{{ posCols }}\" as=\"pc\" hint-placeholder-count=\"15\"><\u002Fsc-for><sc-for list=\"{{ conferidor }}\" as=\"m\" hint-placeholder-count=\"5\">\n              <\u002Fsc-for><sc-for list=\"{{ m.cells }}\" as=\"c\" hint-placeholder-count=\"15\"><\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:12px;\">\n          <thead>\n            <tr style=\"color:#8B76B0; font-size:10.5px; text-transform:uppercase;\">\n              <th style=\"padding:7px 8px; border-bottom:1px solid #E9DFFB; text-align:left;\">Método<\u002Fth>\n              <th style=\"padding:6px; border-bottom:1px solid #E9DFFB; text-align:center;\">{{ pc }}<\u002Fth>\n              <th style=\"padding:7px 8px; border-bottom:1px solid #E9DFFB; text-align:center;\">Acertos<\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr>\n                <td style=\"padding:7px 8px; border-bottom:1px solid #F1ECFB;\"><span style=\"{{ m.badgeStyle }}\">{{ m.label }}<\u002Fspan><\u002Ftd>\n                <td style=\"{{ c.style }}; text-align:center; padding:6px;\">{{ c.num }}<\u002Ftd>\n                <td style=\"padding:7px 8px; border-bottom:1px solid #F1ECFB; text-align:center;\"><span style=\"{{ m.acertosStyle }}\">{{ m.acertos }}<\u002Fspan><\u002Ftd>\n              <\u002Ftr>\n            \n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== SEQUÊNCIAS ===================== -->\n  <sc-if value=\"{{ isSequencias }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:24px 28px; max-width:1280px; margin:0 auto;\">\n      <div style=\"background:#FFF7EA; border:1px solid #FDE9C4; border-radius:8px; padding:12px 16px; font-size:12px; color:#92400E; margin-bottom:20px; line-height:1.6;\">\n        Estas tabelas mostram com que frequência trincas de dezenas consecutivas saíram juntas (sequência) ou tiveram uma quebra (salto) no histórico — do concurso 1 ao 3726. Clique nos títulos das colunas para ordenar. São padrões observados, não indicam maior chance de acerto futuro.\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:18px;\">\n        <div style=\"background:#fff; border:1px solid #E9DFFB; border-radius:14px; padding:18px; box-shadow:0 2px 10px rgba(43,10,77,.06); overflow:auto;\">\n          <div style=\"font-size:11px; font-weight:700; color:#5B21B6; text-transform:uppercase; letter-spacing:.06em; margin-bottom:14px;\">🔢 Tabela de sequência das dezenas<\u002Fdiv>\n          <sc-for list=\"{{ seqCols }}\" as=\"c\" hint-placeholder-count=\"3\">\n                  <\u002Fsc-for><sc-for list=\"{{ seqRows }}\" as=\"r\" hint-placeholder-count=\"23\">\n                <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:13px;\">\n            <thead>\n              <tr style=\"color:#8B76B0; font-size:11px; text-transform:uppercase;\">\n                <th onclick=\"{{ c.onClick }}\" style=\"text-align:left; padding:8px 10px; border-bottom:1px solid #E9DFFB; cursor:pointer; user-select:none;\">{{ c.label }} {{ c.arrow }}<\u002Fth>\n                \n              <\u002Ftr>\n            <\u002Fthead>\n            <tbody>\n              <tr>\n                  <td style=\"padding:7px 10px; border-bottom:1px solid #F1ECFB; font-family:monospace;\">{{ r.dezenas }}<\u002Ftd>\n                  <td style=\"padding:7px 10px; border-bottom:1px solid #F1ECFB;\">{{ r.qtd }}<\u002Ftd>\n                  <td style=\"padding:7px 10px; border-bottom:1px solid #F1ECFB;\">{{ r.pctStr }}<\u002Ftd>\n                <\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E9DFFB; border-radius:14px; padding:18px; box-shadow:0 2px 10px rgba(43,10,77,.06); overflow:auto;\">\n          <div style=\"font-size:11px; font-weight:700; color:#5B21B6; text-transform:uppercase; letter-spacing:.06em; margin-bottom:14px;\">🧩 Tabela de saltos das dezenas<\u002Fdiv>\n          <sc-for list=\"{{ saltoCols }}\" as=\"c\" hint-placeholder-count=\"3\">\n                  <\u002Fsc-for><sc-for list=\"{{ saltoRows }}\" as=\"r\" hint-placeholder-count=\"23\">\n                <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; font-size:13px;\">\n            <thead>\n              <tr style=\"color:#8B76B0; font-size:11px; text-transform:uppercase;\">\n                <th onclick=\"{{ c.onClick }}\" style=\"text-align:left; padding:8px 10px; border-bottom:1px solid #E9DFFB; cursor:pointer; user-select:none;\">{{ c.label }} {{ c.arrow }}<\u002Fth>\n                \n              <\u002Ftr>\n            <\u002Fthead>\n            <tbody>\n              <tr>\n                  <td style=\"padding:7px 10px; border-bottom:1px solid #F1ECFB; font-family:monospace;\">{{ r.dezenas }}<\u002Ftd>\n                  <td style=\"padding:7px 10px; border-bottom:1px solid #F1ECFB;\">{{ r.qt .sort((a, b) => {\n    let av = a[sort.col], bv = b[sort.col];\n    if (sort.col === 'dezenas') { av = parseInt(a.dezenas, 10); bv = parseInt(b.dezenas, 10); }\n    const cmp = av < bv ? -1 : av > bv ? 1 : 0;\n    return sort.dir === 'asc' ? cmp : -cmp;\n  });\n  return copy;\n}\n\nfunction analisarJogo(dezenas) {\n  const moldura = dezenas.filter(n => OUTER_RING.includes(n)).length;\n  const miolo = dezenas.filter(n => INNER_CORE.includes(n)).length;\n  const quentes = dezenas.filter(n => HOT.includes(n)).length;\n  const atrasadas = dezenas.filter(n => LATE.includes(n)).length;\n  const repetidos = dezenas.filter(n => SORTEADAS_3726.includes(n)).length;\n  const sorted = [...dezenas].sort((a,b) => a-b);\n  let maxSeq = dezenas.length ? 1 : 0, cur = 1;\n  for (let i=1; i<sorted.length; i++) { if (sorted[i] === sorted[i-1]+1) { cur++; maxSeq = Math.max(maxSeq, cur); } else cur = 1; }\n  const soma = dezenas.reduce((a,b) => a+b, 0);\n  const somaFaixaComum = soma >= 180 && soma <= 220;\n  const pares = dezenas.filter(n => n % 2 === 0).length;\n  const parImparEquilibrado = pares >= 6 && pares <= 9;\n  let classificacao = 'Neutro';\n  if (quentes > atrasadas) classificacao = 'Quente';\n  else if (atrasadas > quentes) classificacao = 'Frio';\n  const { rowCounts, colCounts } = distribuicao(dezenas);\n  const rowSpread = dezenas.length ? Math.max(...rowCounts) - Math.min(...rowCounts) : 0;\n  const colSpread = dezenas.length ? Math.max(...colCounts) - Math.min(...colCounts) : 0;\n  const distribuicaoBoa = rowSpread <= 2 && colSpread <= 2;\n  return { moldura, miolo, quentes, atrasadas, repetidos, maxSeq, soma, somaFaixaComum, classificacao, rowCounts, colCounts, pares, parImparEquilibrado, distribuicaoBoa };\n}\n\n// Mapa de calor \"da época\": usa uma janela móvel dos concursos anteriores (aproximação,\n// já que não temos a base histórica completa dezena a dezena) — recalcula automaticamente\n// conforme novos concursos entram no topo do array.\nfunction mapaDaEpoca(idx, janelaSize) {\n  const janela = SORTEIOS_RECENTES.slice(idx + 1, idx + 1 + janelaSize);\n  if (janela.length === 0) return { quentes: [], frias: [] };\n  const freq = {}, atraso = {};\n  for (let n = 1; n <= 25; n++) {\n    let count = 0, atr = janela.length;\n    for (let i = 0; i < janela.length; i++) {\n      if (janela[i].dezenas.includes(n)) { count++; if (atr === janela.length) atr = i; }\n    }\n    freq[n] = count / janela.length;\n    atraso[n] = atr;\n  }\n  const quentes = Array.from({length:25}, (_,i)=>i+1).sort((a,b) => freq[b]-freq[a]).slice(0,5);\n  const frias = Array.from({length:25}, (_,i)=>i+1).sort((a,b) => atraso[b]-atraso[a]).slice(0,5);\n  return { quentes, frias };\n}\n\nfunction combinacoes(n, k) {\n  if (k < 0 || k > n) return 0;\n  let r = 1;\n  for (let i = 0; i < k; i++) r = r * (n - i) / (i + 1);\n  return Math.round(r);\n}\n\nconst FECHAMENTO_CUSTO = { 16:56, 17:476, 18:2856, 19:13566, 20:54264 };\n\nfunction mesmaCombinacao(a, b) {\n  if (a.length !== b.length) return false;\n  const sb = new Set(b);\n  return a.every(n => sb.has(n));\n}\n\nclass Component extends DCLogic {\n  state = {\n    tab: 'jogos',\n    selected: [],\n    locked: [],\n    perfil: 'equilibrado',\n    suggestions: [],\n    concursoAlvo: 3727,\n    savedGames: (() => { try { return JSON.parse(localStorage.getItem('lotofacil_meus_jogos') || '[]'); } catch(e) { return []; } })(),\n    fechamentoN: 16,\n    fechamentoSelected: [],\n    fechamentoOpcoes: [],\n    qtdHistorico: 10,\n    seqSort: { col: 'dezenas', dir: 'asc' },\n    saltoSort: { col: 'dezenas', dir: 'asc' },\n  };\n\n  setQtdHistorico(q) { this.setState({ qtdHistorico: q }); }\n\n  setSeqSort(col) {\n    this.setState(s => ({ seqSort: { col, dir: s.seqSort.col === col && s.seqSort.dir === 'asc' ? 'desc' : 'asc' } }));\n  }\n\n  setSaltoSort(col) {\n    this.setState(s => ({ saltoSort: { col, dir: s.saltoSort.col === col && s.saltoSort.dir === 'asc' ? 'desc' : 'asc' } }));\n  }\n\n  setFechamentoN(n) {\n    this.setState(s => ({ fechamentoN: n, fechamentoSelected: s.fechamentoSelected.slice(0, n) }));\n  }\n\n  toggleFechamentoNum(n) {\n    this.setState(s => {\n      const has = s.fechamentoSelected.includes(n);\n      if (has) return { fechamentoSelected: s.fechamentoSelected.filter(x => x !== n), fechamentoOpcoes: [] };\n      if (s.fechamentoSelected.length >= s.fechamentoN) return {};\n      return { fechamentoSelected: [...s.fechamentoSelected, n], fechamentoOpcoes: [] };\n    });\n  }\n\n  autoFechamento() {\n    const targetN = this.state.fechamentoN;\n    // Trava: distribui a escolha pelas 5 faixas do volante (1-5, 6-10, ... 21-25) em vez de só puxar\n    // dezenas \"quentes\" — evita pools enviesados que geram jogos sem dezenas baixas, algo raríssimo em sorteios reais.\n    const base = Math.floor(targetN / 5);\n    let resto = targetN - base * 5;\n    const quotas = ROWS.map(() => base);\n    // distribui o resto entre faixas aleatórias\n    const ordem = shuffle([0,1,2,3,4]);\n    for (let i = 0; i < resto; i++) quotas[ordem[i]]++;\n    let escolhidas = [];\n    ROWS.forEach((faixa, idx) => {\n      const ranked = faixa\n        .map(n => ({ n, score: (HOT.includes(n)?2:0) + (LATE.includes(n)?1.5:0) + (INNER_CORE.includes(n)?1:0) + Math.random() }))\n        .sort((a,b) => b.score - a.score)\n        .slice(0, quotas[idx])\n        .map(x => x.n);\n      escolhidas.push(...ranked);\n    });\n    escolhidas.sort((a,b) => a-b);\n    this.setState({ fechamentoSelected: escolhidas, fechamentoOpcoes: [] });\n  }\n\n  gerarOpcoesFechamento() {\n    const pool = this.state.fechamentoSelected.slice();\n    if (pool.length < 15) return;\n    const results = [];\n    for (let tries = 0; tries < 500; tries++) {\n      const candidate = shuffle(pool).slice(0, 15).sort((a,b) => a-b);\n      const a = analisarJogo(candidate);\n      let score = 0;\n      if (a.somaFaixaComum) score += 3;\n      if (a.parImparEquilibrado) score += 2;\n      if (a.distribuicaoBoa) score += 3;\n      if (a.maxSeq <= 3) score += 2; else score -= (a.maxSeq - 3) * 2;\n      score -= Math.abs(a.soma - 200) * 0.05;\n      results.push({ dezenas: candidate, a, score });\n    }\n    results.sort((x,y) => y.score - x.score);\n    const chosen = [];\n    for (const r of results) {\n      if (chosen.length >= 5) break;\n      const dup = chosen.some(c => c.dezenas.filter(n => r.dezenas.includes(n)).length >= 13);\n      if (!dup) chosen.push(r);\n    }\n    this.setState({ fechamentoOpcoes: chosen });\n  }\n\n  setTab(t) {\n    this.setState({ tab: t });\n    if (t === 'historico') setTimeout(() => this.initChart(), 50);\n  }\n\n  toggleNum(n) {\n    this.setState(s => {\n      const has = s.selected.includes(n);\n      let sel;\n      if (has) sel = s.selected.filter(x => x !== n);\n      else if (s.selected.length < 15) sel = [...s.selected, n];\n      else sel = s.selected;\n      return { selected: sel };\n    });\n  }\n\n  clearSelected() { this.setState({ selected: [], locked: [], suggestions: [] }); }\n\n  setPerfil(p) { this.setState({ perfil: p }); }\n\n  toggleLock(n) {\n    this.setState(s => {\n      const has = s.locked.includes(n);\n      if (!has && !s.selected.includes(n)) return {};\n      return { locked: has ? s.locked.filter(x => x !== n) : [...s.locked, n] };\n    });\n  }\n\n  sugerirJogo() {\n    const s = this.state;\n    const all = Array.from({length:25}, (_,i) => i+1);\n    const locked = s.locked.slice();\n    const targets = {\n      quente: { qMin:3, qMax:5, aMin:0, aMax:2 },\n      frio:    { qMin:0, qMax:2, aMin:3, aMax:5 },\n      equilibrado: { qMin:1, qMax:3, aMin:1, aMax:3 },\n    }[s.perfil] || { qMin:1, qMax:3, aMin:1, aMax:3 };\n\n    const results = [];\n    for (let tries = 0; tries < 700; tries++) {\n      const pick = [...locked];\n      const moldura = shuffle(OUTER_RING.filter(n => !locked.includes(n)));\n      const miolo = shuffle(INNER_CORE.filter(n => !locked.includes(n)));\n      pick.push(...moldura, ...miolo);\n      let candidate = [...new Set(pick)];\n      candidate = shuffle(candidate.filter(n => !locked.includes(n)));\n      candidate = [...locked, ...candidate];\n      if (candidate.length > 15) candidate = candidate.slice(0, 15);\n      while (candidate.length < 15) {\n        const extra = all[Math.floor(Math.random()*all.length)];\n        if (!candidate.includes(extra)) candidate.push(extra);\n      }\n      const sorted = candidate.slice().sort((x,y)=>x-y);\n      const jaSalvo = s.savedGames.some(g => mesmaCombinacao(g.dezenas, sorted));\n      if (jaSalvo) continue;\n      const a = analisarJogo(sorted);\n      let score = 0;\n      if (a.somaFaixaComum) score += 3;\n      if (a.quentes >= targets.qMin && a.quentes <= targets.qMax) score += 2; else score -= Math.abs(a.quentes - (targets.qMin+targets.qMax)/2);\n      if (a.atrasadas >= targets.aMin && a.atrasadas <= targets.aMax) score += 2; else score -= Math.abs(a.atrasadas - (targets.aMin+targets.aMax)/2);\n      if (a.maxSeq <= 3) score += 2; else score -= (a.maxSeq - 3) * 2;\n      if (a.moldura >= 9 && a.moldura <= 11) score += 2;\n      if (a.miolo >= 6 && a.miolo <= 7) score += 2;\n      if (a.parImparEquilibrado) score += 2;\n      score -= Math.abs(a.soma - 200) * 0.05;\n      const rowSpread = Math.max(...a.rowCounts) - Math.min(...a.rowCounts);\n      const colSpread = Math.max(...a.colCounts) - Math.min(...a.colCounts);\n      score -= (rowSpread + colSpread) * 0.3;\n      results.push({ dezenas: sorted, score, a });\n    }\n    results.sort((x,y) => y.score - x.score);\n    // pega top 3 suficientemente diferentes entre si\n    const chosen = [];\n    for (const r of results) {\n      if (chosen.length >= 3) break;\n      const dup = chosen.some(c => c.dezenas.filter(n => r.dezenas.includes(n)).length >= 12);\n      if (!dup) chosen.push(r);\n    }\n    const suggestions = chosen.map(c => ({\n      dezenas: c.dezenas,\n      a: c.a,\n      motivos: [\n        `${c.a.moldura}/16 da moldura e ${c.a.miolo}/9 do miolo — equilíbrio próximo ao recomendado.`,\n        `${c.a.quentes} dezena(s) quente(s) e ${c.a.atrasadas} atrasada(s) — perfil \"${s.perfil}\".`,\n        `Soma ${c.a.soma}${c.a.somaFaixaComum ? ' dentro da faixa comum (180–220).' : ', fora da faixa comum (180–220).'}`,\n        `${c.a.pares}p / ${15 - c.a.pares}i — ${c.a.parImparEquilibrado ? 'equilíbrio típico dos sorteios.' : 'fora do equilíbrio típico (6 a 9 pares).'}`,\n        `Sequência máxima de ${c.a.maxSeq} dezena(s) seguida(s).`,\n        locked.length ? `Mantém as ${locked.length} dezena(s) travada(s) por você.` : `Distribuição equilibrada entre linhas e colunas do volante.`,\n      ],\n    }));\n    this.setState({ suggestions });\n  }\n\n  usarSugestao(idx) {\n    this.setState(s => ({ selected: s.suggestions[idx].dezenas.slice(), suggestions: [] }));\n  }\n\n  onConcursoChange(e) {\n    const v = parseInt(e.target.value, 10);\n    this.setState({ concursoAlvo: isNaN(v) ? '' : v });\n  }\n\n  addGame() {\n    this.setState(s => {\n      if (s.selected.length !== 15) return {};\n      const dezenas = [...s.selected].sort((a,b) => a-b);\n      const soma = dezenas.reduce((a,b) => a+b, 0);\n      const pares = dezenas.filter(n => n % 2 === 0).length;\n      const analise = analisarJogo(dezenas);\n      const game = { concurso: s.concursoAlvo, dezenas, soma, pares, impares: 15 - pares, analise };\n      const games = [...s.savedGames, game];\n      localStorage.setItem('lotofacil_meus_jogos', JSON.stringify(games));\n      return { savedGames: games, selected: [] };\n    });\n  }\n\n  removeGame(idx) {\n    this.setState(s => {\n      const games = s.savedGames.filter((_, i) => i !== idx);\n      localStorage.setItem('lotofacil_meus_jogos', JSON.stringify(games));\n      return { savedGames: games };\n    });\n  }\n\n  componentDidMount() { this.initChart(); }\n\n  initChart() {\n    if (!window.Chart) return;\n    const canvas = document.getElementById('backtestChart');\n    if (!canvas) return;\n    const existing = Chart.getChart(canvas);\n    if (existing) existing.destroy();\n    const muted = '#8B76B0';\n    new Chart(canvas, {\n      data: {\n        labels: BACKTEST_ROWS.map(r => r.label.replace(/^M[0-9] /,'')),\n        datasets: [\n          { type:'bar', label:'Média de acertos (backtest)', data: BACKTEST_ROWS.map(r => parseFloat(r.media)), backgroundColor:'#A855F7', borderRadius:4 },\n          { type:'line', label:'Esperança teórica', data: BACKTEST_ROWS.map(()=>9.0), borderColor:'#16A34A', borderDash:[6,4], pointRadius:0 },\n        ],\n      },\n      options: {\n        plugins: { legend:{ labels:{ color:'#1F1235' } }, title:{ display:true, text:'Backtest em milhares de concursos reais (eixo ampliado)', color:'#1F1235' } },\n        scales: { x:{ ticks:{ color:muted } }, y:{ ticks:{ color:muted }, min:8.5, max:9.5 } },\n      },\n    });\n  }\n\n  renderVals() {\n    const s = this.state;\n    const tab = s.tab;\n\n    const tabs = TABS_DEF.map(t => {\n      const active = t.key === tab;\n      return {\n        ...t,\n        onClick: () => this.setTab(t.key),\n        style: `padding:12px 18px;font-size:13px;font-weight:${active?700:500};color:${active?'#7C3AED':'#8B76B0'};cursor:pointer;border-bottom:3px solid ${active?'#F59E0B':'transparent'};margin-bottom:-2px;white-space:nowrap;`,\n      };\n    });\n\n    const molduraCells = Array.from({length:25}, (_,i) => i+1).map(n => ({\n      num: pad(n),\n      style: cellCircleStyle(n, OUTER_RING, {bg:'#F3E8FF',border:'#7C3AED',color:'#5B21B6'}, 38),\n    }));\n    const mioloCells = Array.from({length:25}, (_,i) => i+1).map(n => ({\n      num: pad(n),\n      style: cellCircleStyle(n, INNER_CORE, {bg:'#DBEAFE',border:'#2563EB',color:'#1E40AF'}, 38),\n    }));\n\n    const posCols = Array.from({length:15}, (_,i) => pad(i+1));\n\n    const fechamentoOptions = [16,17,18,19,20].map(n => ({\n      n, label: String(n),\n      onClick: () => this.setFechamentoN(n),\n      style: `padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid ${s.fechamentoN===n?'#7C3AED':'#E9DFFB'};background:${s.fechamentoN===n?'#7C3AED':'#FAF7FF'};color:${s.fechamentoN===n?'#fff':'#6B5B8A'};`,\n    }));\n    const fechamentoGrid = Array.from({length:25}, (_,i) => i+1).map(n => {\n      const sel = s.fechamentoSelected.includes(n);\n      return {\n        num: pad(n),\n        onClick: () => this.toggleFechamentoNum(n),\n        style: sel\n          ? 'width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;cursor:pointer;border:2px solid #5B21B6;background:#7C3AED;color:#fff;'\n          : 'width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;cursor:pointer;border:2px solid #E9DFFB;background:#FAF7FF;color:#A98DC8;',\n      };\n    });\n    const fN = s.fechamentoN;\n    const fSelCount = s.fechamentoSelected.length;\n    const totalCombos = combinacoes(fN, 15);\n    const fechamentoJogos = (fN === 16 && fSelCount === 16)\n      ? s.fechamentoSelected.map((excluded) => {\n          const jogo = s.fechamentoSelected.filter(x => x !== excluded);\n          return { dezenasStr: jogo.map(pad).join('-') };\n        })\n      : [];\n\n    const fechamentoOpcoesView = (s.fechamentoOpcoes || []).map((op, idx) => ({\n      titulo: `Opção ${idx+1}`,\n      dezenasStr: op.dezenas.map(pad).join('-'),\n      soma: op.a.soma,\n      parImpar: `${op.a.pares}p / ${15 - op.a.pares}i`,\n      molduraMiolo: `${op.a.moldura}/16 · ${op.a.miolo}/9`,\n      classificacao: op.a.classificacao,\n      classificacaoStyle: op.a.classificacao === 'Quente'\n        ? 'background:#FFFBEB;color:#92400E;border:1px solid #F59E0B;border-radius:999px;padding:2px 10px;font-weight:700;font-size:11px;'\n        : op.a.classificacao === 'Frio'\n          ? 'background:#EFF6FF;color:#1E40AF;border:1px solid #2563EB;border-radius:999px;padding:2px 10px;font-weight:700;font-size:11px;'\n          : 'background:#F3E8FF;color:#5B21B6;border:1px solid #7C3AED;border-radius:999px;padding:2px 10px;font-weight:700;font-size:11px;',\n      seqMax: op.a.maxSeq,\n      linhasStr: op.a.rowCounts.join(' · '),\n      somaOk: op.a.somaFaixaComum,\n      parImparOk: op.a.parImparEquilibrado,\n    }));\n\n    const desdobramento = METHOD_DEFS_3727.map(m => ({\n      label: m.label,\n      badgeStyle: `background:${m.bg};color:${m.color};border:1px solid ${m.color}33;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;white-space:nowrap;`,\n      cells: m.dezenas.map(n => ({ num: pad(n), style: tdStyle(n) })),\n      soma: m.soma, p: m.p, i: m.i,\n    }));\n\n    const conferidor = METHOD_JOGOS_3726.map(m => {\n      const acertos = m.dezenas.filter(n => SORTEADAS_3726.includes(n)).length;\n      const acLevel = acertos >= 10 ? {bg:'#DCFCE7',c:'#166534'} : acertos >= 9 ? {bg:'#FEF3C7',c:'#92400E'} : {bg:'#F3E8FF',c:'#5B21B6'};\n      return {\n        label: m.label,\n        badgeStyle: `background:${m.bg};color:${m.color};border:1px solid ${m.color}33;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;white-space:nowrap;`,\n        cells: m.dezenas.map(n => {\n          const hit = SORTEADAS_3726.includes(n);\n          return { num: pad(n), style: hit ? 'background:#DCFCE7;color:#166534;font-weight:700;' : 'color:#C9B8E8;' };\n        }),\n        acertos,\n        acertosStyle: `background:${acLevel.bg};color:${acLevel.c};border-radius:999px;padding:3px 12px;font-weight:700;font-size:13px;`,\n      };\n    });\n\n    const selCount = s.selected.length;\n    const selSoma = selCount ? s.selected.reduce((a,b)=>a+b,0) : '--';\n    const pares = s.selected.filter(n => n%2===0).length;\n    const selParImpar = selCount ? `${pares}p / ${selCount-pares}i` : '--';\n\n    const volante = Array.from({length:25}, (_,i) => i+1).map(n => {\n      const sel = s.selected.includes(n);\n      const lock = s.locked.includes(n);\n      let style;\n      if (lock) style = 'width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer;border:2px solid #D97706;background:#FEF3C7;color:#92400E;transform:scale(1.06);box-shadow:0 0 10px rgba(217,119,6,.35);';\n      else if (sel) style = 'width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer;border:2px solid #5B21B6;background:#7C3AED;color:#fff;transform:scale(1.06);box-shadow:0 0 10px rgba(124,58,237,.4);';\n      else style = 'width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer;border:2px solid #E9DFFB;background:#FAF7FF;color:#A98DC8;';\n      return {\n        num: pad(n),\n        onClick: () => this.toggleNum(n),\n        onLockClick: (e) => { e.stopPropagation(); this.toggleLock(n); },\n        showLock: sel || lock,\n        lockIcon: lock ? '🔒' : '🔓',\n        style: style + 'position:relative;',\n      };\n    });\n\n    const perfilOptions = [\n      { key:'quente', label:'🔥 Quente' },\n      { key:'equilibrado', label:'⚖️ Equilibrado' },\n      { key:'frio', label:'❄️ Frio' },\n    ].map(p => {\n      const active = p.key === s.perfil;\n      return { ...p, onClick: () => this.setPerfil(p.key), style: `padding:7px 13px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid ${active?'#7C3AED':'#E9DFFB'};background:${active?'#7C3AED':'#FAF7FF'};color:${active?'#fff':'#6B5B8A'};white-space:nowrap;` };\n    });\n\n    const suggestionsView = s.suggestions.map((sg, idx) => ({\n      dezenasStr: sg.dezenas.map(pad).join('-'),\n      soma: sg.a.soma,\n      classificacao: sg.a.classificacao,\n      classificacaoStyle: sg.a.classificacao === 'Quente'\n        ? 'background:#FFFBEB;color:#92400E;border:1px solid #F59E0B;border-radius:999px;padding:2px 10px;font-weight:700;font-size:11px;'\n        : sg.a.classificacao === 'Frio'\n          ? 'background:#EFF6FF;color:#1E40AF;border:1px solid #2563EB;border-radius:999px;padding:2px 10px;font-weight:700;font-size:11px;'\n          : 'background:#F3E8FF;color:#5B21B6;border:1px solid #7C3AED;border-radius:999px;padding:2px 10px;font-weight:700;font-size:11px;',\n      motivos: sg.motivos,\n      onUse: () => this.usarSugestao(idx),\n    }));\n\n    const savedGamesView = s.savedGames.map((g, idx) => {\n      const a = g.analise || analisarJogo(g.dezenas);\n      return {\n        concurso: g.concurso,\n        dezenasStr: g.dezenas.map(pad).join('-'),\n        soma: g.soma,\n        parImpar: `${g.pares}p / ${g.impares}i`,\n        analiseResumo: `Moldura ${a.moldura}/16 · Quentes ${a.quentes} · Seq.máx ${a.maxSeq} · ${a.somaFaixaComum ? 'soma comum' : 'soma fora da faixa'}`,\n        classificacao: a.classificacao,\n        classificacaoStyle: a.classificacao === 'Quente'\n          ? 'background:#FFFBEB;color:#92400E;border:1px solid #F59E0B55;border-radius:999px;padding:2px 10px;font-weight:700;font-size:11.5px;'\n          : a.classificacao === 'Frio'\n            ? 'background:#EFF6FF;color:#1E40AF;border:1px solid #2563EB55;border-radius:999px;padding:2px 10px;font-weight:700;font-size:11.5px;'\n            : 'background:#F3E8FF;color:#5B21B6;border:1px solid #7C3AED55;border-radius:999px;padding:2px 10px;font-weight:700;font-size:11.5px;',\n        onRemove: () => this.removeGame(idx),\n      };\n    });\n\n    const liveA = analisarJogo(s.selected);\n\n    const sortedFreqIdx = FREQ_PCT.map((v,i)=>({v,n:i+1})).sort((a,b)=>b.v-a.v).slice(0,5).map(x=>pad(x.n));\n    const sortedAtrasoIdx = ATRASO.map((v,i)=>({v,n:i+1})).sort((a,b)=>b.v-a.v).slice(0,5).map(x=>pad(x.n));\n\n    const heatmap = Array.from({length:25}, (_,i) => i+1).map(n => {\n      const f = FREQ_PCT[n-1];\n      const a = ATRASO[n-1];\n      let bg,border,color;\n      if (a >= 3) { bg='#FDF2F8'; border='#EC4899'; color='#9D174D'; }\n      else if (f >= 61) { bg='#FFFBEB'; border='#F59E0B'; color='#92400E'; }\n      else { bg='#F3E8FF'; border='#DDD0F0'; color='#5B21B6'; }\n      return { num: pad(n), freq: f.toFixed(1), atraso: a, style: `border-radius:10px;padding:10px 4px;text-align:center;border:1px solid ${border};background:${bg};color:${color};` };\n    });\n\n    return {\n      headerGradient: 'linear-gradient(135deg,#7C3AED 0%,#5B21B6 55%,#3B0764 100%)',\n      tabs,\n      isJogos: tab === 'jogos',\n      isMeusJogos: tab === 'meusjogos',\n      isConferidor: tab === 'conferidor',\n      isSequencias: tab === 'sequencias',\n      isHistorico: tab === 'historico',\n      seqCols: [\n        { key:'dezenas', label:'Dezenas' }, { key:'qtd', label:'Qtd' }, { key:'pct', label:'%' },\n      ].map(c => ({\n        ...c,\n        onClick: () => this.setSeqSort(c.key),\n        arrow: s.seqSort.col === c.key ? (s.seqSort.dir === 'asc' ? '▲' : '▼') : '',\n      })),\n      saltoCols: [\n        { key:'dezenas', label:'Dezenas' }, { key:'qtd', label:'Qtd' }, { key:'pct', label:'%' },\n      ].map(c => ({\n        ...c,\n        onClick: () => this.setSaltoSort(c.key),\n        arrow: s.saltoSort.col === c.key ? (s.saltoSort.dir === 'asc' ? '▲' : '▼') : '',\n      })),\n      seqRows: sortRows(SEQUENCIA_DATA, s.seqSort).map(r => ({ dezenas: r.dezenas, qtd: r.qtd, pctStr: r.pct.toFixed(2).replace('.', ',') + '%' })),\n      saltoRows: sortRows(SALTO_DATA, s.saltoSort).map(r => ({ dezenas: r.dezenas, qtd: r.qtd, pctStr: r.pct.toFixed(2).replace('.', ',') + '%' })),\n      molduraCells, mioloCells, posCols, desdobramento, conferidor,\n      fechamentoOptions, fechamentoGrid,\n      fechamentoN: fN,\n      fSelCount, fSelTotal: fN,\n      autoFechamento: () => this.autoFechamento(),\n      totalCombos,\n      custoAproximado: FECHAMENTO_CUSTO[fN] ? `R$ ${FECHAMENTO_CUSTO[fN].toLocaleString('pt-BR')}` : '--',\n      fechamentoJogos,\n      hasFechamentoJogos: fechamentoJogos.length > 0,\n      fechamentoPronto: fSelCount === fN,\n      showGerarOpcoes: fN > 16 && fSelCount === fN,\n      gerarOpcoesFechamento: () => this.gerarOpcoesFechamento(),\n      fechamentoOpcoesView,\n      hasFechamentoOpcoes: fechamentoOpcoesView.length > 0,\n      sorteadasView: SORTEADAS_3726.map(pad),\n      selCount, selSoma, selParImpar,\n      volante,\n      concursoAlvo: s.concursoAlvo,\n      onConcursoChange: (e) => this.onConcursoChange(e),\n      addGame: () => this.addGame(),\n      clearSelected: () => this.clearSelected(),\n      sugerirJogo: () => this.sugerirJogo(),\n      perfilOptions,\n      suggestionsView,\n      hasSuggestions: s.suggestions.length > 0,\n      addDisabled: selCount !== 15,\n      addBtnStyle: selCount === 15\n        ? 'flex:1;background:#DCFCE7;border:1px solid #16A34A55;color:#166534;border-radius:8px;padding:11px 16px;cursor:pointer;font-size:14px;font-weight:600;'\n        : 'flex:1;background:#F3F0FA;border:1px solid #E9DFFB;color:#B8A6DB;border-radius:8px;padding:11px 16px;cursor:not-allowed;font-size:14px;font-weight:600;',\n      savedGamesView,\n      liveAnalysis: {\n        moldura: liveA.moldura, miolo: liveA.miolo, quentes: liveA.quentes, atrasadas: liveA.atrasadas,\n        maxSeq: liveA.maxSeq, repetidos: liveA.repetidos,\n        linhasStr: liveA.rowCounts.join(' · '),\n        colunasStr: liveA.colCounts.join(' · '),\n        somaLabel: selCount === 0 ? '--' : (liveA.somaFaixaComum ? 'Sim' : 'Não'),\n        somaCorClass: liveA.somaFaixaComum ? '#166534' : '#9D174D',\n        classificacao: selCount === 0 ? '--' : liveA.classificacao,\n        classificacaoStyle: liveA.classificacao === 'Quente'\n          ? 'background:#FFFBEB;color:#92400E;border:1px solid #F59E0B;border-radius:999px;padding:5px 16px;font-weight:700;font-size:14px;'\n          : liveA.classificacao === 'Frio'\n            ? 'background:#EFF6FF;color:#1E40AF;border:1px solid #2563EB;border-radius:999px;padding:5px 16px;font-weight:700;font-size:14px;'\n            : 'background:#F3E8FF;color:#5B21B6;border:1px solid #7C3AED;border-radius:999px;padding:5px 16px;font-weight:700;font-size:14px;',\n      },\n      analysisPartialLabel: selCount === 15 ? '' : `(${selCount}/15 selecionadas)`,\n      savedCount: `${s.savedGames.length} jogo(s)`,\n      hasNoGames: s.savedGames.length === 0,\n      backtestRows: BACKTEST_ROWS,\n      topFreq: sortedFreqIdx,\n      topAtraso: sortedAtrasoIdx,\n      heatmap,\n      historico: HISTORICO,\n      qtdOptions: [10,20,50].map(q => ({\n        q, onClick: () => this.setQtdHistorico(q),\n        style: `padding:6px 14px;border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer;border:1px solid ${s.qtdHistorico===q?'#7C3AED':'#E9DFFB'};background:${s.qtdHistorico===q?'#7C3AED':'#FAF7FF'};color:${s.qtdHistorico===q?'#fff':'#6B5B8A'};`,\n      })),\n      sorteiosView: SORTEIOS_RECENTES.slice(0, s.qtdHistorico).map((sr, idx) => {\n        const a = analisarJogo(sr.dezenas);\n        const epoca = mapaDaEpoca(idx, 10);\n        return {\n          concurso: sr.concurso, data: sr.data,\n          dezenasView: sr.dezenas.map(pad),\n          soma: a.soma,\n          parImpar: `${a.pares}p / ${15 - a.pares}i`,\n          classificacao: a.classificacao,\n          classificacaoStyle: a.classificacao === 'Quente'\n            ? 'background:#FFFBEB;color:#92400E;border:1px solid #F59E0B;border-radius:999px;padding:2px 9px;font-weight:700;font-size:11px;'\n            : a.classificacao === 'Frio'\n              ? 'background:#EFF6FF;color:#1E40AF;border:1px solid #2563EB;border-radius:999px;padding:2px 9px;font-weight:700;font-size:11px;'\n              : 'background:#F3E8FF;color:#5B21B6;border:1px solid #7C3AED;border-radius:999px;padding:2px 9px;font-weight:700;font-size:11px;',\n          quentesEpoca: epoca.quentes.length ? epoca.quentes.map(pad).join(' ') : '—',\n          friasEpoca: epoca.frias.length ? epoca.frias.map(pad).join(' ') : '—',\n        };\n      }),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
