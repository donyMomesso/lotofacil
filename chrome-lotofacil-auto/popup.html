<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preenchedor de Dezenas</title>
  <style>
    body {
      width: 340px;
      margin: 0;
      padding: 14px;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f4fb;
      color: #251538;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      box-sizing: border-box;
      resize: vertical;
      border: 1px solid #cdbbe5;
      border-radius: 8px;
      padding: 10px;
      font: 13px/1.4 Consolas, "Courier New", monospace;
      color: #251538;
      background: #fff;
      outline: none;
    }

    textarea:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, .15);
    }

    button {
      width: 100%;
      margin-top: 10px;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: #6d28d9;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .65;
    }

    .status {
      min-height: 18px;
      margin-top: 10px;
      font-size: 12px;
      color: #6b587c;
    }

    .status.error {
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <h1>Preenchedor de Dezenas</h1>

  <textarea id="numbersInput" placeholder="01 03 05 12 18&#10;02 04 06 13 20"></textarea>
  <button id="startButton" type="button">Iniciar Preenchimento</button>
  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
